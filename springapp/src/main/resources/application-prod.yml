# Production profile - with full security enabled

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/app_db?createDatabaseIfNotExist=true
    username: root
    password: examly
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false # Disable in production
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  profiles:
    active: prod,security

security:
  enabled: true
  jwt:
    secret: mySecretKey123456789012345678901234567890 # Use a proper secret in real production
    expiration: 86400000 # 24 hours in milliseconds



# Logging for production

logging:
  level:
    org.springframework.security: INFO
    com.examly.springapp: INFO