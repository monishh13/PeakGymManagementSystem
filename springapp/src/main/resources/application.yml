# Base configuration for ALL environments

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/app_db?createDatabaseIfNotExist=true
    username: root
    password: examly
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  profiles:
    active: test
  config:
    import:
      - optional:classpath:application-${spring.profiles.active}.yml



# Security defaults (overridden by application-test.yml and application-prod.yml)

security:
  enabled: false
  jwt:
    secret: mySecretKey123456789012345678901234567890

logging:
  level:
    root: DEBUG
    org.springframework: DEBUG
    com.examly.springapp: DEBUG
